# 与 proposal 一致：联合 DocVQA + ChartQA（当前已构建的 processed）
experiment_name: joint_docvqa_chartqa
datasets:
  - docvqa
  - chartqa
train_files:
  - data/processed/docvqa/train.jsonl
  - data/processed/chartqa/train.jsonl
validation_files:
  - data/processed/docvqa/validation.jsonl
  - data/processed/chartqa/validation.jsonl
# 高显存：较大 micro-batch，不设 image_max_pixels（走 processor 默认缩放，保留更多细节）
batch_size: 2
eval_batch_size: 2
# 有效批量 = 2 × 8 = 16（与原 1×16 一致，便于沿用学习率）
gradient_accumulation_steps: 8
learning_rate: 0.0001
num_train_epochs: 2
sampling: balanced
max_answer_tokens: 16
# Qwen3-VL 训练 collator 关闭 truncation（避免截断破坏 image token 对齐）；此项保留供后续扩展或筛数据时参考
max_seq_length: 2048
prompt_style: structured
output_dir: outputs/checkpoints/joint_docvqa_chartqa
save_strategy: steps
logging_steps: 10
save_steps: 100
logging_strategy: steps
eval_strategy: steps
eval_steps: 100
load_best_model_at_end: true
metric_for_best_model: eval_loss
greater_is_better: false
seed: 42
bf16: true
# 显存充足时关闭，加速前向并略改善数值稳定性（相对 checkpoint 重算）
gradient_checkpointing: false
