experiment_name: chartqa_only
datasets:
  - chartqa
train_files:
  - data/processed/chartqa/train.jsonl
validation_files:
  - data/processed/chartqa/validation.jsonl
batch_size: 2
eval_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 0.0001
num_train_epochs: 2
max_answer_tokens: 16
max_seq_length: 2048
prompt_style: structured
output_dir: outputs/checkpoints/chartqa_only
save_strategy: steps
logging_steps: 10
save_steps: 100
logging_strategy: steps
eval_strategy: steps
eval_steps: 100
load_best_model_at_end: true
metric_for_best_model: eval_loss
greater_is_better: false
seed: 42
