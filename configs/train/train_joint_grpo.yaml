# Stage 3 训练配置：Task-Stratified GRPO（实验 E8）
# 从 TRA checkpoint（E5）或 LoRA checkpoint（E3）续训

experiment_name: joint_ts_grpo
datasets:
  - docvqa
  - chartqa
train_files:
  - data/processed/docvqa/train.jsonl
  - data/processed/chartqa/train.jsonl
validation_files:
  - data/processed/docvqa/validation.jsonl
  - data/processed/chartqa/validation.jsonl

# ── GRPO 专用超参 ────────────────────────────────────────────────────────
grpo_group_size: 8          # G：每道题采样的答案数（SFT 模型已很好，G 需足够大以降低 skip 率）
grpo_kl_coef: 0.01          # β：KL 散度惩罚系数（DAPO 模式下自动设为 0）
grpo_clip_eps: 0.2          # PPO-clip ε_low（对称 clip 的下界）
grpo_clip_eps_high: 0.28    # PPO-clip ε_high（DAPO 不对称 clip 的上界，标准 GRPO 设为与 ε_low 相同）
grpo_temperature: 1.0       # 采样温度（SFT 后模型过于确定，需提高以获得多样性）
grpo_max_new_tokens: 32     # 生成最大 token 数（VQA 答案通常很短）
grpo_num_steps: 20000       # RL 训练步数 (15000 步基本能覆盖 60% 的数据集)
grpo_eval_steps: 4000       # 每隔多少步在 val set 上评测一次
grpo_save_steps: 4000       # 每隔多少步保存 checkpoint
# loss_type: "grpo" (标准), "dapo" (DAPO 变体), "dr_grpo" (Dr.GRPO)
grpo_loss_type: grpo
grpo_task_names:            # 任务列表（顺序决定 task_id，与 tra.yaml 一致）
  - docvqa
  - chartqa
  - scienceqa
  - mmmu
  - infographicvqa
  - textvqa

# ── 优化器超参 ───────────────────────────────────────────────────────────
learning_rate: 5.0e-6       # RL 阶段 lr 远小于 SFT
batch_size: 1               # RL 每 step 1 道题 × G=8 次生成
gradient_accumulation_steps: 4  # 注意：GRPO 使用手动训练循环，此参数当前未生效

# ── 输出 ─────────────────────────────────────────────────────────────────
output_dir: outputs/checkpoints/joint_ts_grpo
seed: 42
bf16: true
prompt_style: structured
