# ── LoRA SFT 训练配置（NPU 版本）──────────────────────────────────────────
# 与 train_joint.yaml 对应，针对昇腾 910B (32GB HBM × N卡) 调整
# 主要差异：
#   1. bf16=true（910B 原生支持，fp16 在昇腾上不推荐）
#   2. dataloader_num_workers=0（torch_npu 多进程 DataLoader 有已知 bug）
#   3. gradient_checkpointing=true（910B 单卡 32GB，Qwen3-VL-8B 需要此选项）
#   4. batch_size 根据 NPU 显存调整

output_dir: outputs/checkpoints/joint_docvqa_chartqa_npu

datasets:
  - name: docvqa
    train_file: data/processed/docvqa/train.jsonl
    val_file:   data/processed/docvqa/validation.jsonl
  - name: chartqa
    train_file: data/processed/chartqa/train.jsonl
    val_file:   data/processed/chartqa/validation.jsonl

sampling: balanced
prompt_style: structured

# ── 训练超参 ──────────────────────────────────────────────────────────────
num_train_epochs: 2
batch_size: 1                       # 910B 32GB，Qwen3-VL-8B 视觉 token 长，batch=1
gradient_accumulation_steps: 8      # 等效 batch=8
learning_rate: 1.0e-4
warmup_ratio: 0.03
lr_scheduler_type: cosine
max_seq_length: null                # 不截断
image_max_pixels: 1003520           # 约 1M pixel（降低视觉 token 数量）

# ── 精度 & 效率（NPU 关键配置）────────────────────────────────────────────
bf16: true                          # 昇腾 910B BF16 加速
fp16: false                         # 不用 fp16（昇腾 fp16 有精度风险）
gradient_checkpointing: true        # 必须开启以节省 HBM
dataloader_num_workers: 0          # torch_npu 已知 bug：多进程 DataLoader 会 hang

# ── Checkpoint & 日志 ─────────────────────────────────────────────────────
logging_strategy: steps
logging_steps: 10
save_strategy: steps
save_steps: 100
save_total_limit: 3
eval_strategy: "no"                 # 训练期不做 eval（用 stage 05 专门评测）
ignore_index: -100
